[versions]
libbulletjme = "23.0.0"
crucible = "1.0.0"
hytale-gradle = "1.0.37"
lombok = "1.18.38"
joml = "1.10.5"
jsr305 = "3.0.2"
junit = "5.12.2"
objenesis = "3.4"

[libraries]
libbulletjme = { module = "com.github.stephengold:Libbulletjme-Linux64", version.ref = "libbulletjme" }
# TODO: Linux and others...
libbulletjme-native = { module = "com.github.stephengold:Libbulletjme-Linux64", version.ref = "libbulletjme" }
crucible = { module = "com.ionforgelabs:crucible", version.ref = "crucible" }
lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }
joml = { module = "org.joml:joml", version.ref = "joml" }
jsr305 = { module = "com.google.code.findbugs:jsr305", version.ref = "jsr305" }
junit-bom = { module = "org.junit:junit-bom", version.ref = "junit" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter" }
junit-jupiter-api = { module = "org.junit.jupiter:junit-jupiter-api" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }
objenesis = { module = "org.objenesis:objenesis", version.ref = "objenesis" }

[plugins]
hytale-workspace = { id = "com.azuredoom.hytale-workspace", version.ref = "hytale-gradle" }
hytale-tools = { id = "com.azuredoom.hytale-tools", version.ref = "hytale-gradle" }
