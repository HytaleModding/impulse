name: Crucible Smoke

on:
  workflow_dispatch:
    inputs:
      tags:
        description: Crucible tag filter to run
        required: true
        default: smoke

permissions:
  contents: read

jobs:
  crucible-smoke:
    name: Hytale server Crucible smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve Crucible dependency
        run: ./gradlew :impulse-core:dependencies --configuration compileClasspath

      - name: Install patched Crucible runtime jar
        run: |
          chmod +x scripts/ci/install-crucible-runtime.sh
          scripts/ci/install-crucible-runtime.sh

      - name: Run Hytale server Crucible smoke
        run: |
          set -o pipefail
          JAVA_TOOL_OPTIONS="-Dcrucible.autorun=true -Dcrucible.tags=${{ inputs.tags }}" \
            timeout 240s ./gradlew -Pimpulse.coreOnlyWorkspace=true runAllMods \
              -x :impulse-core:downloadAssetsZip 2>&1 | tee run/crucible-smoke.log

      - name: Upload Crucible reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crucible-smoke-reports
          if-no-files-found: ignore
          path: |
            run/crucible-smoke.log
            run/logs/**
            run/mods/com.ionforgelabs_crucible/crucible-results.xml
            run/mods/com.ionforgelabs_crucible/crucible-report.html
