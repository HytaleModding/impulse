name: Crucible Smoke

on:
  workflow_dispatch:
    inputs:
      tags:
        description: Crucible tag filter to run
        required: true
        default: smoke

permissions:
  contents: read

jobs:
  crucible-smoke:
    name: Hytale server Crucible smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Restore Hytale OAuth refresh token
        env:
          HYTALE_REFRESH_TOKEN: ${{ secrets.HYTALE_REFRESH_TOKEN }}
        run: |
          if [ -z "${HYTALE_REFRESH_TOKEN}" ]; then
            echo "::error::Set the HYTALE_REFRESH_TOKEN repository secret before running Crucible smoke."
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          token_file = Path.home() / ".gradle" / "caches" / "hytale-auth" / "tokens.json"
          token_file.parent.mkdir(parents=True, exist_ok=True)
          token_file.write_text(json.dumps({"refreshToken": os.environ["HYTALE_REFRESH_TOKEN"]}))
          PY

      - name: Resolve Crucible dependency
        run: ./gradlew :impulse-core:dependencies --configuration compileClasspath

      - name: Install patched Crucible runtime jar
        run: |
          chmod +x scripts/ci/install-crucible-runtime.sh
          scripts/ci/install-crucible-runtime.sh

      - name: Run Hytale server Crucible smoke
        run: |
          set -o pipefail
          JAVA_TOOL_OPTIONS="-Dcrucible.autorun=true -Dcrucible.tags=${{ inputs.tags }}" \
            timeout 1500s ./gradlew -Pimpulse.coreOnlyWorkspace=true runAllMods 2>&1 \
              | tee run/crucible-smoke.log

      - name: Upload Crucible reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crucible-smoke-reports
          if-no-files-found: ignore
          path: |
            run/crucible-smoke.log
            run/logs/**
            run/mods/com.ionforgelabs_crucible/crucible-results.xml
            run/mods/com.ionforgelabs_crucible/crucible-report.html
