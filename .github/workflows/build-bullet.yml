name: Build Bullet

on:
  push:
  pull_request:

jobs:
  build-bullet:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build impulse-bullet
        run: ./gradlew :impulse-bullet:build

      - name: Upload impulse-bullet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: impulse-bullet-${{ runner.os }}
          path: impulse-bullet/build/libs/

